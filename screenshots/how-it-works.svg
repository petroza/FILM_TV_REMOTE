<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 680" font-family="Segoe UI, system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0f15"/><stop offset="1" stop-color="#090a0e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12151d"/><stop offset="1" stop-color="#0b0d13"/>
    </linearGradient>
    <linearGradient id="pTV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a63"/><stop offset="1" stop-color="#141a2c"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d5a1f"/><stop offset="1" stop-color="#2a2410"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5a2f6e"/><stop offset="1" stop-color="#241a2c"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f6e4a"/><stop offset="1" stop-color="#153524"/></linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f4f7e"/><stop offset="1" stop-color="#16233a"/></linearGradient>
    <linearGradient id="t5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7e3a3a"/><stop offset="1" stop-color="#3a1c1c"/></linearGradient>
    <linearGradient id="t6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f6e6e"/><stop offset="1" stop-color="#153434"/></linearGradient>
    <marker id="aGold" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0 0 L9 4 L0 8 z" fill="#f0a53a"/></marker>
    <marker id="aBlue" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0 0 L9 4 L0 8 z" fill="#5a9bff"/></marker>
    <marker id="aBlueS" markerWidth="12" markerHeight="12" refX="1" refY="4" orient="auto"><path d="M9 0 L0 4 L9 8 z" fill="#5a9bff"/></marker>
    <marker id="aGreen" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0 0 L9 4 L0 8 z" fill="#6ee6a0"/></marker>
  </defs>

  <rect width="1280" height="680" fill="url(#bg)"/>

  <!-- title -->
  <text x="640" y="52" text-anchor="middle" fill="#e8e8ea" font-size="30" font-weight="700">FILM_TV_REMOTE &#8212; how it works</text>
  <text x="640" y="82" text-anchor="middle" fill="#8a93a6" font-size="16">One PC serves your movies. Watch on the TV, control from your phone &#8212; all on your home Wi&#8209;Fi.</text>

  <!-- home wifi band -->
  <rect x="70" y="150" width="1140" height="330" rx="26" fill="#0f1219" stroke="#1b2130" stroke-width="1.5"/>
  <g opacity="0.9">
    <text x="150" y="182" fill="#5f6b82" font-size="14" font-weight="600">&#128246; Home Wi&#8209;Fi network</text>
  </g>

  <!-- ============ TV (left) ============ -->
  <g>
    <rect x="95" y="196" width="340" height="212" rx="12" fill="#05070b" stroke="#2a3040" stroke-width="3"/>
    <rect x="107" y="208" width="316" height="188" rx="6" fill="url(#pTV)"/>
    <!-- "playing" poster hint + play button -->
    <circle cx="265" cy="292" r="42" fill="#000" opacity="0.35"/>
    <path d="M251 270 L295 292 L251 314 z" fill="#ffffff" opacity="0.92"/>
    <!-- subtitle bar -->
    <rect x="137" y="360" width="256" height="20" rx="5" fill="#000" opacity="0.5"/>
    <text x="265" y="374" text-anchor="middle" fill="#e8e8ea" font-size="12">&#8230; subtitles: Czech &#8230;</text>
    <!-- stand -->
    <rect x="245" y="408" width="40" height="26" fill="#20232c"/>
    <rect x="200" y="432" width="130" height="10" rx="4" fill="#20232c"/>
    <text x="265" y="466" text-anchor="middle" fill="#cfd6e6" font-size="15" font-weight="600">&#128250; TV browser</text>
    <text x="265" y="486" text-anchor="middle" fill="#6ee6a0" font-size="13">opens /tv &#183; fullscreen</text>
  </g>

  <!-- ============ Phone (center) ============ -->
  <g>
    <rect x="575" y="192" width="130" height="256" rx="20" fill="#05070b" stroke="#2a3040" stroke-width="3"/>
    <rect x="585" y="212" width="110" height="216" rx="8" fill="url(#screen)"/>
    <text x="640" y="232" text-anchor="middle" fill="#e8e8ea" font-size="10" font-weight="700">&#127916; Now on TV</text>
    <!-- transport controls -->
    <circle cx="608" cy="262" r="13" fill="#1b1e28" stroke="#2a2f3e"/>
    <path d="M604 256 L604 268 M613 256 L613 268" stroke="#cfd6e6" stroke-width="2"/>
    <circle cx="640" cy="262" r="16" fill="#2563eb"/>
    <path d="M635 254 L648 262 L635 270 z" fill="#fff"/>
    <circle cx="672" cy="262" r="13" fill="#1b1e28" stroke="#2a2f3e"/>
    <path d="M666 256 L676 262 L666 268 z" fill="#cfd6e6"/>
    <!-- seek bar -->
    <rect x="596" y="292" width="88" height="5" rx="2.5" fill="#2a2f3e"/>
    <rect x="596" y="292" width="40" height="5" rx="2.5" fill="#3b82f6"/>
    <!-- subtitle select -->
    <rect x="596" y="312" width="88" height="24" rx="7" fill="#171922" stroke="#2a2e3d"/>
    <text x="606" y="328" fill="#cfd6e6" font-size="10">&#128172; Ukrajinsky &#9662;</text>
    <!-- mini action chips -->
    <rect x="596" y="346" width="27" height="22" rx="6" fill="#0f1219" stroke="#2f6e4a"/>
    <rect x="627" y="346" width="27" height="22" rx="6" fill="#0f1219" stroke="#2f4f7e"/>
    <rect x="658" y="346" width="27" height="22" rx="6" fill="#0f1219" stroke="#7e5a2f"/>
    <text x="609" y="361" text-anchor="middle" font-size="11">&#127760;</text>
    <text x="640" y="361" text-anchor="middle" font-size="11">&#128260;</text>
    <text x="671" y="361" text-anchor="middle" font-size="11">&#127919;</text>
    <text x="640" y="470" text-anchor="middle" fill="#cfd6e6" font-size="15" font-weight="600">&#128241; Phone</text>
    <text x="640" y="490" text-anchor="middle" fill="#9ec5ff" font-size="13">remote &amp; browser</text>
  </g>

  <!-- ============ PC (right) ============ -->
  <g>
    <rect x="845" y="196" width="340" height="212" rx="12" fill="#05070b" stroke="#2a3040" stroke-width="3"/>
    <rect x="857" y="208" width="316" height="188" rx="6" fill="url(#screen)"/>
    <text x="872" y="230" fill="#e8e8ea" font-size="12" font-weight="700">&#127916; FILMY</text>
    <text x="1158" y="230" text-anchor="end" fill="#5f6b82" font-size="11">server :8099</text>
    <!-- gallery tiles 3x2 -->
    <g>
      <rect x="872" y="240" width="88" height="66" rx="6" fill="url(#t1)"/>
      <rect x="970" y="240" width="88" height="66" rx="6" fill="url(#t2)"/>
      <rect x="1068" y="240" width="90" height="66" rx="6" fill="url(#t3)"/>
      <rect x="872" y="314" width="88" height="66" rx="6" fill="url(#t4)"/>
      <rect x="970" y="314" width="88" height="66" rx="6" fill="url(#t5)"/>
      <rect x="1068" y="314" width="90" height="66" rx="6" fill="url(#t6)"/>
    </g>
    <!-- stand -->
    <rect x="995" y="408" width="40" height="26" fill="#20232c"/>
    <rect x="950" y="432" width="130" height="10" rx="4" fill="#20232c"/>
    <text x="1015" y="466" text-anchor="middle" fill="#cfd6e6" font-size="15" font-weight="600">&#128187; PC &#8212; the server</text>
    <text x="1015" y="486" text-anchor="middle" fill="#8a93a6" font-size="13">&#127902; your movies folder</text>
  </g>

  <!-- ============ arrows ============ -->
  <!-- PC -> TV : video stream (big arc over the top) -->
  <path d="M845 250 C 640 96, 640 96, 435 250" fill="none" stroke="#f0a53a" stroke-width="3.5" marker-end="url(#aGold)"/>
  <rect x="547" y="112" width="186" height="30" rx="15" fill="#0d0f15" stroke="#4a3a18"/>
  <text x="640" y="132" text-anchor="middle" fill="#f0a53a" font-size="15" font-weight="600">&#9654; Video stream (HTTP)</text>

  <!-- Phone <-> PC : browse & control -->
  <line x1="712" y1="300" x2="838" y2="300" stroke="#5a9bff" stroke-width="3.5" marker-end="url(#aBlue)" marker-start="url(#aBlueS)"/>
  <text x="775" y="290" text-anchor="middle" fill="#9ec5ff" font-size="12.5" font-weight="600">browse &#183; control</text>
  <text x="775" y="320" text-anchor="middle" fill="#5f6b82" font-size="11">ratings &#183; subtitles</text>

  <!-- Phone -> TV : remote -->
  <line x1="568" y1="300" x2="442" y2="300" stroke="#6ee6a0" stroke-width="3.5" marker-end="url(#aGreen)"/>
  <text x="505" y="290" text-anchor="middle" fill="#6ee6a0" font-size="12.5" font-weight="600">remote</text>
  <text x="505" y="320" text-anchor="middle" fill="#5f6b82" font-size="11">play &#183; subtitles</text>

  <!-- footer legend -->
  <g font-size="13">
    <circle cx="360" cy="560" r="6" fill="#f0a53a"/><text x="374" y="565" fill="#aeb6c6">Movie streams from the PC to the TV's browser (fullscreen).</text>
    <circle cx="360" cy="588" r="6" fill="#5a9bff"/><text x="374" y="593" fill="#aeb6c6">Phone browses the gallery on the PC (posters, IMDb ratings, subtitles).</text>
    <circle cx="360" cy="616" r="6" fill="#6ee6a0"/><text x="374" y="621" fill="#aeb6c6">Phone works as the remote &#8212; it tells the PC what to play on the TV.</text>
  </g>
  <text x="640" y="656" text-anchor="middle" fill="#4a5364" font-size="12">No cloud &#183; no accounts &#183; everything stays on your local network</text>
</svg>
